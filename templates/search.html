{% extends "base.html" %}

{% block content %}

<div class="container">

<h1>Search Results</h1>

<table class="table">

<tr>
<th>Name</th>
<th>Rating</th>
</tr>

{% for p in players %}

<tr>

<td>
<a href="{{ url_for('player_profile', fide_id=p.fide_id) }}">
{{ p.name }}
</a>
</td>

<td>{{ p.standard_rating }}</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
