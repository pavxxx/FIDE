{% extends "base.html" %}
{% block content %}

<div class="auth-page" style="height: auto; padding: 60px 0;">
    <div class="auth-card" style="width: 480px; text-align: left;">
        <h2 style="margin-bottom: 10px;">Add New Player</h2>
        
        <form method="POST">
            <label style="font-size: 12px; font-weight: 600; color: #777; margin-bottom: 6px; display: block; text-transform: uppercase;">FIDE ID</label>
            <input type="number" name="fide_id" placeholder="e.g. 1234567" required>
            
            <label style="font-size: 12px; font-weight: 600; color: #777; margin-bottom: 6px; display: block; text-transform: uppercase;">Full Name</label>
            <input type="text" name="name" placeholder="e.g. Carlsen, Magnus" required>
            
            <label style="font-size: 12px; font-weight: 600; color: #777; margin-bottom: 6px; display: block; text-transform: uppercase;">Federation Code</label>
            <input type="text" name="fed" placeholder="e.g. NOR" required maxlength="3">
            
            <label style="font-size: 12px; font-weight: 600; color: #777; margin-bottom: 6px; display: block; text-transform: uppercase;">Sex (M/F)</label>
            <input type="text" name="sex" placeholder="e.g. M" required maxlength="1">
            
            <label style="font-size: 12px; font-weight: 600; color: #777; margin-bottom: 6px; display: block; text-transform: uppercase;">Birth Year</label>
            <input type="number" name="birth_year" placeholder="e.g. 1990">
            
            <hr style="margin: 25px 0; border: none; border-top: 1px solid #eee;">
            <p style="margin-bottom: 20px; font-weight: 600; font-size: 16px; text-align: center;">Initial Ratings</p>
            
            <label style="font-size: 12px; font-weight: 600; color: #777; margin-bottom: 6px; display: block; text-transform: uppercase;">Standard Rating</label>
            <input type="number" name="std_rating" placeholder="0 if unrated">
            
            <label style="font-size: 12px; font-weight: 600; color: #777; margin-bottom: 6px; display: block; text-transform: uppercase;">Games Played</label>
            <input type="number" name="std_games" placeholder="e.g. 40">

            {% if error %}
            <div class="alert-error">{{ error }}</div>
            {% endif %}

            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button type="submit" class="btn-primary" style="flex: 1; border: none; font-family: 'Inter', sans-serif;"><span>Save Player</span></button>
                <a href="{{ url_for('admin_dashboard') }}" class="btn-outline" style="flex: 1; text-align: center; display: flex; align-items: center; justify-content: center; text-decoration: none; font-weight: 500;">Cancel</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
