{% extends "base.html" %}
{% block content %}

<div class="container" style="margin-top: 40px; margin-bottom: 80px;">
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="font-size: 28px; font-weight: 600; letter-spacing: -0.5px;">Admin Dashboard</h2>
        <a href="{{ url_for('add_player') }}" class="btn-primary"><span>+ Add New Player</span></a>
    </div>

    <!-- The table block -->
    <table class="table">
        <thead>
            <tr>
                <th>FIDE ID</th>
                <th>Name</th>
                <th>Federation</th>
                <th>Sex</th>
                <th>Standard Rating</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for p in players %}
            <tr>
                <td>{{ p.fide_id }}</td>
                <td>{{ p.name }}</td>
                <td><span class="fed-badge">{{ p.fed }}</span> {{ p.fed|fed_flag }}</td>
                <td>{{ p.sex }}</td>
                <td>{{ p.standard_rating or 'Unrated' }}</td>
                <td>
                    <a href="{{ url_for('edit_player', fide_id=p.fide_id) }}" class="btn-outline" style="padding: 6px 12px; font-size: 13px;">Edit</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

{% endblock %}
