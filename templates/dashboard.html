{% extends "base.html" %}

{% block content %}

<div class="container dashboard">

    <h1>Welcome, {{ player.name }}</h1>

    <div class="dashboard-grid">

        <div class="card">
            <h3>Standard Rating</h3>
            <p>{{ player.standard_rating }}</p>
        </div>

        <div class="card">
            <h3>Rapid Rating</h3>
            <p>{{ player.rapid_rating }}</p>
        </div>

        <div class="card">
            <h3>Blitz Rating</h3>
            <p>{{ player.blitz_rating }}</p>
        </div>

    </div>

</div>

{% endblock %}
