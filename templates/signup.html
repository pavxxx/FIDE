{% extends "base.html" %}
{% block content %}

<div class="auth-page">

<div class="auth-card">

<h2>Create Account</h2>

<form method="POST">

<input type="text" name="user_id" placeholder="User ID / Username" required>

<select name="role" required style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: 1px solid var(--border-color, #444); background: var(--card-bg); color: var(--text-color); font-family: 'Inter', sans-serif;">
    <option value="" disabled selected>Select Role</option>
    <option value="player">Player</option>
    <option value="admin">Admin</option>
</select>

<input type="password" name="password" placeholder="Password" required>

{% if error %}
<div class="alert-error">{{ error }}</div>
{% endif %}

<button class="btn-primary" style="width: 100%;"><span>Signup</span></button>

</form>

</div>

</div>

{% endblock %}
